          },
          {
            "id": "6e764703-6e5e-4ea3-9462-34652c2678ef",
            "title": "普通高中教科书·数学（A版）必修 第一册",
            "subject": "数学",
            "pdf_url": "https://r1-ndr-oversea.ykt.cbern.com.cn/edu_product/esp/assets/6e764703-6e5e-4ea3-9462-34652c2678ef.pkg/普通高中教科书 数学 必修 第一册（A版）_1756191767678.pdf"
          },
          {
            "id": "6979e325-aba2-4576-8ff6-db6a475f5321",
            "title": "普通高中教科书·生物学必修2 遗传与进化",
            "subject": "生物",
            "pdf_url": "https://r1-ndr-oversea.ykt.cbern.com.cn/edu_product/esp/assets/6979e325-aba2-4576-8ff6-db6a475f5321.pkg/普通高中教科书 生物学 必修2 遗传与进化_1725097243903.pdf"
          }
        ];

        // 1. 去重并按学科分组
        const groupedBySubject = {};
        const seenTitles = new Set();

        textbookData.forEach(book => {
            if (!seenTitles.has(book.title)) {
                if (!groupedBySubject[book.subject]) {
                    groupedBySubject[book.subject] = [];
                }
                groupedBySubject[book.subject].push(book);
                seenTitles.add(book.title);
            }
        });

        // 2. 生成 HTML
        const listContainer = document.getElementById('textbook-list');
        let htmlContent = '';

        // 可选：按特定順序顯示學科
        const subjectOrder = ['语文', '数学', '英语', '物理', '化学', '生物', '历史', '地理', '思想政治'];
        const sortedSubjects = Object.keys(groupedBySubject).sort((a, b) => {
            const indexA = subjectOrder.indexOf(a);
            const indexB = subjectOrder.indexOf(b);
            if (indexA !== -1 && indexB !== -1) return indexA - indexB;
            if (indexA !== -1) return -1;
            if (indexB !== -1) return 1;
            return a.localeCompare(b, 'zh-CN'); // Fallback for subjects not in the list
        });
        
        sortedSubjects.forEach(subject => {
            htmlContent += `<h2>${subject}</h2>`;
            htmlContent += '<ul>';
            
            const books = groupedBySubject[subject];
            // 可选：按书名排序
            books.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));

            books.forEach(book => {
                // `download` 属性建议浏览器下载文件而不是直接打开
                htmlContent += `<li><a href="${book.pdf_url}" download>${book.title}</a></li>`;
            });

            htmlContent += '</ul>';
        });

        listContainer.innerHTML = htmlContent;
    </script>
</body>
</html>
