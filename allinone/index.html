    <title>BDFZ-SUEN</title>

    <!-- Avoid theme flash: apply saved/system theme BEFORE first paint -->
    <script>
        (() => {
            const KEY = 'themePreference';
            let saved = null;
            try { saved = localStorage.getItem(KEY); } catch (_) { }
            const hour = new Date().getHours();
            const sys = (hour >= 18 || hour < 6) ? 'dark' : 'light';
            const theme = (saved === 'dark' || saved === 'light') ? saved : sys;

            document.documentElement.classList.toggle('dark-mode', theme === 'dark');
            document.documentElement.style.colorScheme = (theme === 'dark') ? 'dark' : 'light';
        })();
    </script>

    <style>
        /* === Font Loading === */
        @font-face {
            font-family: 'HuWenMingChaoTi';
            src: url('../fonts/HuWenMingChaoTi.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* === Matrix Background === */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        html.dark-mode #matrix-bg,
        body.dark-mode #matrix-bg {
            opacity: 0.25;
        }

        /* === THEME VARIABLES === */
        :root {
            /* Light Mode (Default) Colors */
            --primary-gradient-light: linear-gradient(135deg, #005f73, #0a9396);
            --secondary-gradient-light: linear-gradient(135deg, #94d2bd, #e9d8a6);
            --background-gradient-light: linear-gradient(135deg, #001219, #005f73);
            --text-color-light: #e9ecef;
            --dark-text-color-light: #001219;
            --countdown-item-bg-light: rgba(255, 255, 255, 0.1);
            --countdown-title-color-light: var(--dark-text-color-light);
            --countdown-display-color-light: var(--dark-text-color-light);
            --footer-link-color-light: #e9d8a6;
            --footer-link-hover-light: #94d2bd;
            --button-text-color-light: var(--text-color-light);
            --button-hover-shadow-light: 0 4px 8px rgba(0, 0, 0, 0.2);
            --progress-bar-bg-light: rgba(0, 0, 0, 0.25);
            --progress-bar-fill-light: var(--primary-gradient-light);
            --progress-bar-border-light: rgba(255, 255, 255, 0.1);
            --progress-bar-text-shadow-light: 1px 1px 3px rgba(0, 0, 0, 0.6);
            --logo-focus-shadow-light: rgba(148, 210, 189, 0.5);

            /* Surface system for coordination */
            --surface-main-light: var(--neo-bg);
            --surface-left-light: color-mix(in oklab, var(--neo-bg) 90%, #0a9396 10%);
            --surface-right-light: color-mix(in oklab, var(--neo-bg) 90%, #e9d8a6 10%);

            --surface-main: var(--surface-main-light);
            --surface-left: var(--surface-left-light);
            --surface-right: var(--surface-right-light);

            /* Dark Mode Colors */
            --primary-gradient-dark: linear-gradient(135deg, #2c3e50, #34495e);
            --secondary-gradient-dark: linear-gradient(135deg, #485a6d, #597085);
            --background-gradient-dark: linear-gradient(135deg, #0f111a, #1e2430);
            --text-color-dark: #d8dee9;
            --dark-text-color-dark: #b0b8c4;
            --countdown-item-bg-dark: rgba(44, 62, 80, 0.4);
            --countdown-title-color-dark: var(--text-color-dark);
            --countdown-display-color-dark: var(--text-color-dark);
            --footer-link-color-dark: #81a1c1;
            --footer-link-hover-dark: #8fbcbb;
            --button-text-color-dark: var(--text-color-dark);
            --button-hover-shadow-dark: 0 4px 8px rgba(0, 0, 0, 0.4);
            --progress-bar-bg-dark: rgba(255, 255, 255, 0.1);
            --progress-bar-fill-dark: linear-gradient(135deg, #5e81ac, #81a1c1);
            --progress-bar-border-dark: rgba(255, 255, 255, 0.05);
            --progress-bar-text-shadow-dark: 1px 1px 2px rgba(0, 0, 0, 0.8);
            --logo-focus-shadow-dark: rgba(94, 129, 172, 0.6);

            --primary-gradient: var(--primary-gradient-light);
            --secondary-gradient: var(--secondary-gradient-light);
            --background-gradient: var(--background-gradient-light);
            --text-color: var(--text-color-light);
            --dark-text-color: var(--dark-text-color-light);
            --countdown-item-bg: var(--countdown-item-bg-light);
            --countdown-title-color: var(--countdown-title-color-light);
            --countdown-display-color: var(--countdown-display-color-light);
            --footer-link-color: var(--footer-link-color-light);
            --footer-link-hover: var(--footer-link-hover-light);
            --button-text-color: var(--button-text-color-light);
            --button-hover-shadow: var(--button-hover-shadow-light);
            --progress-bar-bg: var(--progress-bar-bg-light);
            --progress-bar-fill: var(--progress-bar-fill-light);
            --progress-bar-border: var(--progress-bar-border-light);
            --progress-bar-text-shadow: var(--progress-bar-text-shadow-light);
            --logo-focus-shadow: var(--logo-focus-shadow-light);

            --theme-transition: background 0.3s ease, color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        html.dark-mode body,
        body.dark-mode {
            --primary-gradient: var(--primary-gradient-dark);
            --secondary-gradient: var(--secondary-gradient-dark);
            --background-gradient: var(--background-gradient-dark);
            --text-color: #c2cad3;
            --dark-text-color: #9aa3ad;
            --countdown-item-bg: var(--countdown-item-bg-dark);
            --countdown-title-color: var(--countdown-title-color-dark);
            --countdown-display-color: var(--countdown-display-color-dark);
            --footer-link-color: #7aa3bf;
            --footer-link-hover: #8fb9c7;
            --button-text-color: var(--button-text-color-dark);
            --button-hover-shadow: var(--button-hover-shadow-dark);
            --progress-bar-bg: var(--progress-bar-bg-dark);
            --progress-bar-fill: var(--progress-bar-fill-dark);
            --progress-bar-border: var(--progress-bar-border-dark);
            --progress-bar-text-shadow: var(--progress-bar-text-shadow-dark);
            --logo-focus-shadow: var(--logo-focus-shadow-dark);
            --surface-main: var(--neo-bg);
            --surface-left: color-mix(in oklab, var(--neo-bg) 88%, #34495e 12%);
            --surface-right: color-mix(in oklab, var(--neo-bg) 88%, #597085 12%);
        }

        /* ===== Neumorphism (新拟物) styles ===== */
        :root {
            --neo-bg: #e9edf3;
            --neo-light: rgba(255, 255, 255, 0.95);
            --neo-dark: rgba(163, 177, 198, 0.60);
        }

        html.dark-mode body,
        body.dark-mode {
            --neo-bg: #1e222a;
            --neo-light: rgba(255, 255, 255, 0.06);
            --neo-dark: rgba(0, 0, 0, 0.60);
        }

        .neo-scope {
            background: var(--neo-bg) !important;
        }

        .neo {
            background: var(--neo-bg);
            border-radius: 16px;
            box-shadow:
                12px 12px 24px var(--neo-dark),
                -12px -12px 24px var(--neo-light);
            transition: box-shadow .2s ease, transform .15s ease, background .2s ease;
        }

        .neo-gradient {
            background: linear-gradient(145deg,
                    color-mix(in oklab, var(--neo-bg) 85%, white 15%),
                    color-mix(in oklab, var(--neo-bg) 85%, black 15%));
        }

        .neo-inset {
            box-shadow:
                inset 8px 8px 16px var(--neo-dark),
                inset -8px -8px 16px var(--neo-light);
        }

        .neo-round {
            border-radius: 50%;
            padding: 10px;
        }

        .neo:hover {
            box-shadow:
                6px 6px 12px var(--neo-dark),
                -6px -6px 12px var(--neo-light);
            transform: translateY(-1px);
        }

        .neo:active {
            box-shadow:
                inset 6px 6px 12px var(--neo-dark),
                inset -6px -6px 12px var(--neo-light);
            transform: translateY(0);
        }

        .neo-track {
            background: var(--neo-bg);
            border-radius: 999px;
            box-shadow:
                inset 7px 7px 14px var(--neo-dark),
                inset -7px -7px 14px var(--neo-light);
        }

        .neo-border {
            border: 1px solid color-mix(in oklab, var(--neo-bg), #000 12%);
        }

        .link-button.neo {
            background: var(--primary-gradient);
            color: var(--button-text-color);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .countdown-item.neo {
            background: var(--neo-bg);
        }

        .footer.neo {
            background: var(--neo-bg);
            color: var(--dark-text-color);
        }

        /* === GLOBAL & LAYOUT === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
        }

        body {
            font-family: 'HuWenMingChaoTi', 'Noto Sans TC', 'NotoSansCJKsc', 'Helvetica Neue', Arial, sans-serif;
            background: var(--background-gradient);
            color: var(--text-color);

            min-height: 100vh;
            min-height: 100svh;
            min-height: 100dvh;

            /* ✅ 安全区适配（iOS 刘海/底部手势条） */
            padding-top: calc(16px + env(safe-area-inset-top));
            padding-right: calc(16px + env(safe-area-inset-right));
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            padding-left: calc(16px + env(safe-area-inset-left));

            overflow-y: auto;

            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--theme-transition);
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: 8px;
            z-index: 9999;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--neo-bg);
            color: var(--dark-text-color);
            border: 1px solid color-mix(in oklab, var(--neo-bg), #000 12%);
            box-shadow: 6px 6px 12px var(--neo-dark), -6px -6px 12px var(--neo-light);
        }

        .skip-link:focus {
            left: 12px;
            outline: none;
        }

        .container {
            /* ✅ 用 Grid 固定三栏：不会因为宽度临界而“自动换行截断” */
            width: 100%;
            max-width: 1400px;

            flex: 0 1 auto;

            display: grid;
            grid-template-columns:
                minmax(240px, 1fr) minmax(360px, 520px) minmax(240px, 1fr);
            gap: 16px;
            align-items: stretch;
        }

        /* === HEIGHT-BASED FIT === */
        @media (max-height: 900px) {
            .column {
                padding: 16px;
            }

            .container {
                gap: 16px;
            }

            .link-button {
                padding: 10px 8px;
                font-size: 0.95rem;
            }

            .countdown-item {
                padding: 12px;
            }

            .countdown-title {
                font-size: 1.1rem;
            }

            .countdown-display {
                font-size: 1.6rem;
            }

            #gaokao-countdown .countdown-display,
            #human-timer .countdown-display {
                font-size: 1.25rem;
            }

            .logo-img {
                width: 64px;
            }

            .progress-bar-container {
                height: 26px;
            }
        }

        @media (max-height: 800px) {
            .column {
                padding: 12px;
            }

            .container {
                gap: 12px;
            }

            .link-button {
                padding: 8px 8px;
                font-size: 0.9rem;
            }

            .countdown-item {
                padding: 10px;
            }

            .countdown-title {
                font-size: 1rem;
            }

            .countdown-display {
                font-size: 1.4rem;
            }

            #gaokao-countdown .countdown-display,
            #human-timer .countdown-display {
                font-size: 1.15rem;
            }

            .logo-img {
                width: 56px;
            }

            .progress-bar-container {
                height: 24px;
            }
        }

        @media (max-height: 720px) {
            .column {
                padding: 10px;
            }

            .container {
                gap: 10px;
            }

            .link-button {
                padding: 7px 6px;
                font-size: 0.85rem;
            }

            .countdown-item {
                padding: 8px;
            }

            .countdown-title {
                font-size: 0.95rem;
            }

            .countdown-display {
                font-size: 1.25rem;
            }

            #current-time-clock {
                font-size: 1.3rem;
            }

            .logo-img {
                width: 52px;
            }

            .progress-bar-container {
                height: 22px;
            }
        }

        .brand-accent {
            color: #d9244c !important;
        }

        .footer a .brand-accent {
            color: #d9244c !important;
        }

        .footer a:hover .brand-accent,
        .footer a:focus .brand-accent {
            color: #d9244c !important;
            text-decoration: underline;
        }

        /* ✅ 核心修复：三列永远锁在各自底框里，内容多了只在列内部滚动 */
        .column {
            flex: 1;
            padding: 16px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: var(--theme-transition);
            min-width: 0;

            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .left-column {
            background: var(--surface-left);
            --panel-surface: var(--surface-left);
        }

        .right-column {
            background: var(--surface-right);
            --panel-surface: var(--surface-right);
        }

        /* ✅ 左右栏：滚动区，永不溢出底框 */
        .left-column,
        .right-column {
            justify-content: flex-start;
        }

        .side-scroll {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .side-scroll .link-button {
            margin-bottom: 0;
        }

        /* scrollbar 细一点，别抢戏 */
        .side-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(120, 120, 120, 0.35) transparent;
        }

        .side-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .side-scroll::-webkit-scrollbar-thumb {
            background: rgba(120, 120, 120, 0.35);
            border-radius: 10px;
        }

        .side-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        /* === MIDDLE COLUMN === */
        .countdown-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--surface-main);
            align-items: center;
            justify-content: flex-start;
            min-height: 0;
        }

        /* ✅ 中栏滚动区：倒计时内容滚动，footer 固定在底框内 */
        .center-scroll {
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .center-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(120, 120, 120, 0.35) transparent;
        }

        .center-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .center-scroll::-webkit-scrollbar-thumb {
            background: rgba(120, 120, 120, 0.35);
            border-radius: 10px;
        }

        .center-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        /* === LOGO THEME TOGGLE === */
        .theme-toggle-logo-button {
            order: -1;
            margin-bottom: 15px;
            padding: 0;
            border: none;
            background: none;
            cursor: pointer;
            line-height: 0;
            -webkit-tap-highlight-color: transparent;
            border-radius: 8px;
            transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            flex: 0 0 auto;
        }

        .logo-img {
            display: block;
            width: 72px;
            height: auto;
            border-radius: 8px;
        }

        .theme-toggle-logo-button:hover .logo-img {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .theme-toggle-logo-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--logo-focus-shadow);
        }

        .theme-toggle-logo-button:focus .logo-img {
            opacity: 0.85;
            transform: scale(1.05);
        }

        /* === COUNTDOWN ITEMS === */
        .countdown-item {
            background-color: var(--countdown-item-bg);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            width: 100%;
            transition: var(--theme-transition);
        }

        .countdown-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: var(--countdown-title-color);
            transition: var(--theme-transition);
        }

        .countdown-display {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--countdown-display-color);
            transition: var(--theme-transition);
            word-wrap: break-word;
            line-height: 1.3;
        }

        #gaokao-countdown .countdown-display,
        #human-timer .countdown-display {
            font-size: 1.4rem;
        }

        #current-time .countdown-display span {
            display: block;
            line-height: 1.4;
            color: var(--countdown-display-color);
            transition: var(--theme-transition);
        }

        #current-time .countdown-display span:not(:last-child) {
            margin-bottom: 5px;
        }

        #current-time-clock {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 8px !important;
        }

        #current-date-gregorian {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* === Unix & Binary Clock === */
        .geek-time-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .geek-time-item {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            background: color-mix(in oklab, var(--neo-bg) 85%, #000 15%);
            color: var(--dark-text-color);
            letter-spacing: 0.5px;
            white-space: nowrap;
            border: 1px solid color-mix(in oklab, var(--neo-bg), #000 12%);
        }

        html.dark-mode .geek-time-item,
        body.dark-mode .geek-time-item {
            background: color-mix(in oklab, var(--neo-bg) 80%, #fff 5%);
            color: var(--text-color);
            border-color: color-mix(in oklab, var(--neo-bg), #fff 10%);
        }

        .geek-time-item .label {
            color: #00d084;
            margin-right: 4px;
        }

        html.dark-mode .geek-time-item .label,
        body.dark-mode .geek-time-item .label {
            color: #5eead4;
        }

        /* === PROGRESS BARS (GEEK/HUD) === */
        .progress-item .countdown-display {
            display: none;
        }

        .progress-day {
            --hud-accent: #00d084;
        }

        .progress-week {
            --hud-accent: #ffb020;
        }

        .progress-year {
            --hud-accent: #9a7dff;
        }

        .progress-bar-container {
            width: 92%;
            height: 28px;
            margin: 6px auto 0;
            position: relative;
            overflow: hidden;
            border-radius: 999px;

            background:
                linear-gradient(180deg,
                    color-mix(in oklab, var(--neo-bg) 78%, #000 22%),
                    color-mix(in oklab, var(--neo-bg) 70%, #000 30%));

            border: 1px solid color-mix(in oklab, var(--neo-bg), #000 28%);
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 10px 10px 22px rgba(0, 0, 0, 0.18),
                inset -10px -10px 22px rgba(255, 255, 255, 0.06);

            transition: var(--theme-transition);
        }

        .progress-bar-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(to right,
                    rgba(255, 255, 255, 0.20) 0,
                    rgba(255, 255, 255, 0.20) 1px,
                    rgba(255, 255, 255, 0.00) 1px,
                    rgba(255, 255, 255, 0.00) 12px);
            opacity: 0.18;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .progress-bar-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0.00) 0%,
                    rgba(255, 255, 255, 0.14) 35%,
                    rgba(255, 255, 255, 0.00) 70%);
            transform: translateX(-70%);
            animation: hudScan 3.4s ease-in-out infinite;
            opacity: 0.35;
            pointer-events: none;
            mix-blend-mode: soft-light;
        }

        @keyframes hudScan {
            0% {
                transform: translateX(-70%);
            }

            55% {
                transform: translateX(10%);
            }

            100% {
                transform: translateX(85%);
            }
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            position: relative;
            overflow: hidden;
            border-radius: 999px 6px 6px 999px;

            background: linear-gradient(90deg,
                    color-mix(in oklab, var(--hud-accent) 88%, #fff 12%),
                    color-mix(in oklab, var(--hud-accent) 92%, #000 8%));

            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.10),
                0 0 14px color-mix(in oklab, var(--hud-accent), #fff 25%);

            transition: width 0.5s ease-out, var(--theme-transition);
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(135deg,
                    rgba(255, 255, 255, 0.18) 0,
                    rgba(255, 255, 255, 0.18) 8px,
                    rgba(255, 255, 255, 0.00) 8px,
                    rgba(255, 255, 255, 0.00) 16px);
            opacity: 0.35;
            transform: translateX(0);
            animation: hudStripes 1.8s linear infinite;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        @keyframes hudStripes {
            0% {
                transform: translateX(-18px);
            }

            100% {
                transform: translateX(18px);
            }
        }

        .progress-bar-fill::before {
            content: '';
            position: absolute;
            right: 0;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: rgba(255, 255, 255, 0.70);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.35);
            opacity: 0.9;
            pointer-events: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .progress-bar-fill {
                transition: none;
            }

            .progress-bar-container::after {
                animation: none;
            }

            .progress-bar-fill::after {
                animation: none;
            }
        }

        .progress-bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0.6px;
            white-space: nowrap;
            user-select: none;
            padding: 0;
            border-radius: 0;
            background: transparent;

            color: color-mix(in oklab, var(--dark-text-color) 90%, #000 10%);
            text-shadow:
                0 1px 0 rgba(0, 0, 0, 0.25),
                0 0 12px color-mix(in oklab, var(--hud-accent), #fff 35%);

            transition: var(--theme-transition);
        }

        html.dark-mode .progress-bar-text,
        body.dark-mode .progress-bar-text {
            color: color-mix(in oklab, var(--text-color) 92%, #fff 8%);
            text-shadow:
                0 1px 0 rgba(0, 0, 0, 0.55),
                0 0 12px color-mix(in oklab, var(--hud-accent), #fff 28%);
        }

        .progress-bar-fill.is-ending {
            background: #d9244c !important;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.12),
                0 0 18px rgba(217, 36, 76, 0.38);
        }

        .progress-bar-container.is-ending {
            border-color: rgba(217, 36, 76, 0.55);
            animation: endPulse 1.35s ease-in-out infinite;
        }

        .progress-bar-text.is-ending {
            color: #ffffff;
            text-shadow:
                0 1px 0 rgba(0, 0, 0, 0.55),
                0 0 14px rgba(217, 36, 76, 0.55);
        }

        @keyframes endPulse {

            0%,
            100% {
                box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.06),
                    inset 10px 10px 22px rgba(0, 0, 0, 0.18),
                    inset -10px -10px 22px rgba(255, 255, 255, 0.06);

            55% {

                    inset 10px 10px 22px rgba(0, 0, 0, 0.18),
                    inset -10px -10px 22px rgba(255, 255, 255, 0.06),
                    0 0 0 6px rgba(217, 36, 76, 0.18);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .progress-bar-container.is-ending {
                animation: none;
            }
        }

        /* ========== GEEK FEATURES CSS ========== */

        /* === Glitch Effect === */
        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        .glitch-text::before {
            color: #ff0080;
            z-index: -1;
        }

        .glitch-text::after {
            color: #00ffff;
            z-index: -2;
        }

        .glitch-text.glitching::before {
            animation: glitch1 0.3s ease-in-out;
        }

        .glitch-text.glitching::after {
            animation: glitch2 0.3s ease-in-out;
        }

        @keyframes glitch1 {

            0%,
            100% {
                opacity: 0;
                transform: translate(0);
            }

            20% {
                opacity: 0.8;
                transform: translate(-3px, 2px);
                clip-path: inset(20% 0 40% 0);
            }

            40% {
                opacity: 0.8;
                transform: translate(3px, -2px);
                clip-path: inset(60% 0 10% 0);
            }

            60% {
                opacity: 0.8;
                transform: translate(-2px, 1px);
                clip-path: inset(10% 0 70% 0);
            }

            80% {
                opacity: 0.8;
                transform: translate(2px, -1px);
                clip-path: inset(50% 0 20% 0);
            }
        }

        @keyframes glitch2 {

            0%,
            100% {
                opacity: 0;
                transform: translate(0);
            }

            20% {
                opacity: 0.8;
                transform: translate(3px, -2px);
                clip-path: inset(40% 0 20% 0);
            }

            40% {
                opacity: 0.8;
                transform: translate(-3px, 2px);
                clip-path: inset(10% 0 60% 0);
            }

            60% {
                opacity: 0.8;
                transform: translate(2px, -1px);
                clip-path: inset(70% 0 10% 0);
            }

            80% {
                opacity: 0.8;
                transform: translate(-2px, 1px);
                clip-path: inset(20% 0 50% 0);
            }
        }

        /* === Typewriter Effect === */
        .typewriter {
            overflow: hidden;
            border-right: 2px solid var(--dark-text-color);
            white-space: nowrap;
            animation: typing 2s steps(20, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from {
                width: 0;

            to {
                width: 100%;
            }
        }

        @keyframes blink-caret {

            from,
            to {
                border-color: transparent;
            }

            50% {
                border-color: var(--dark-text-color);
            }
        }

        .typewriter.done {
            border-right: none;
            animation: none;
            width: 100%;

        // === Matrix Rain Background ===
        (function initMatrix() {
            const canvas = document.getElementById('matrix-bg');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const chars = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ABCDEF<>{}[]|\\/:;';
            const fontSize = 14;
            let columns = Math.floor(canvas.width / fontSize);
            let drops = Array(columns).fill(1);
            let frameCount = 0;
            const frameSkip = 3; // Only update every 3rd frame for slower animation

            function draw() {
                // Slower fade for longer trails
                ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const isDark = document.documentElement.classList.contains('dark-mode') ||
                    document.body.classList.contains('dark-mode');
                ctx.fillStyle = isDark ? '#00ff41' : '#005f73';
                ctx.font = `${fontSize}px monospace`;

                for (let i = 0; i < drops.length; i++) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            let animId;
            function loop() {
                frameCount++;
                if (frameCount >= frameSkip) {
                    frameCount = 0;
                    draw();
                }
                animId = requestAnimationFrame(loop);
            }

            // Only run when tab is visible
            function start() {
                if (!animId) loop();
            }
            function stop() {
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
            }

            start();
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) stop();
                else start();
            });

            // Re-init columns on resize
            window.addEventListener('resize', () => {
                columns = Math.floor(canvas.width / fontSize);
                drops = Array(columns).fill(1);
            });
        })();

        // === 訪問者資訊寫入頁腳（加入 sessionStorage 緩存，避免每次刷新都打 API） ===
        function codeToFlag(cc) {
            if (!cc) return '';
            return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
        }

        async function fetchWithTimeout(url, ms = 2500) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            try {
                const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
                const status = res.status;
                const json = await res.json().catch(() => ({}));
                return { status, json };
            } catch (_) {
                return { status: 0, json: null };
            } finally {
                clearTimeout(timer);
            }
        }

        async function loadVisitorInfo() {
            const ipCityEl = document.getElementById('footer-ip-city');
            const orgCountryEl = document.getElementById('footer-org-country');
            if (!ipCityEl || !orgCountryEl) return;

            const CACHE_KEY = 'visitorInfoCacheV1';
            const CACHE_TTL_MS = 12 * 60 * 60 * 1000; // 12h

            try {
                const cachedRaw = sessionStorage.getItem(CACHE_KEY);
                if (cachedRaw) {
                    const cached = JSON.parse(cachedRaw);
                    if (cached && cached.t && cached.info && (Date.now() - cached.t) < CACHE_TTL_MS) {
                        const info = cached.info;
                        const ipCity = [info.ip, info.city].filter(Boolean).join(' | ');
                        const countryDisplay = [codeToFlag(info.cc), info.country].filter(Boolean).join(' | ');
                        ipCityEl.textContent = ipCity;
                        orgCountryEl.textContent = [info.isp, countryDisplay].filter(Boolean).join(' / ');
                        return;
                    }
                }
            } catch (_) { }

            const PROVIDERS = [
                {
                    name: 'ipwhois',
                    url: 'https://ipwho.is/',
                    ok: (status, d) => status === 200 && d && d.success !== false,
                    map: (d) => ({
                        ip: d.ip || '',
                        city: d.city || '',
                        isp: (d.connection && (d.connection.isp || d.connection.org)) || '',
                        cc: d.country_code || '',
                        country: d.country || ''
                    })
                },
                {
                    name: 'ipapi',
                    url: 'https://ipapi.co/json/',
                    ok: (status, d) => status === 200 && d && (d.ip || d.country_code),
                    map: (d) => ({
                        ip: d.ip || '',
                        city: d.city || '',
                        isp: d.org || d.org_name || d.asn || '',
                        cc: d.country_code || '',
                        country: d.country_name || ''
                    })
                },
                {
                    name: 'geojs',
                    url: 'https://get.geojs.io/v1/ip/geo.json',
                    ok: (status, d) => status === 200 && d && (d.ip || d.country_code),
                    map: (d) => ({
                        ip: d.ip || '',
                        city: d.city || '',
                        isp: d.organization || '',
                        cc: d.country_code || '',
                        country: d.country || ''
                    })
                }
            ];

            let info = null;
            for (const p of PROVIDERS) {
                const { status, json } = await fetchWithTimeout(p.url, 2500);
                if (p.ok(status, json || {})) {
                    info = p.map(json || {});
                    break;
                }
            }

            if (info) {
                const ipCity = [info.ip, info.city].filter(Boolean).join(' | ');
                const countryDisplay = [codeToFlag(info.cc), info.country].filter(Boolean).join(' | ');
                ipCityEl.textContent = ipCity;
                orgCountryEl.textContent = [info.isp, countryDisplay].filter(Boolean).join(' / ');

                try {
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), info }));
                } catch (_) { }

                // Store raw info for JSON modal
                window.__visitorInfo = info;
            } else {
                ipCityEl.style.display = 'none';
                orgCountryEl.style.display = 'none';
            }
        }

            const SCHEME_NAMES = COLOR_SCHEMES.map(s => s.name);

            function applyColorScheme(schemeName, isDark) {
                const scheme = COLOR_SCHEMES.find(s => s.name === schemeName) || COLOR_SCHEMES[0];
                const palette = isDark ? scheme.dark : scheme.light;
                const body = document.body;

                // Apply all CSS variables
                for (const [prop, val] of Object.entries(palette)) {
                    if (prop === '--btn-bg' || prop === '--btn-hover' || prop === '--side-link-bg') continue;
                    body.style.setProperty(prop, val);
                }

                // Apply button colors via dynamic style
                let dynStyle = document.getElementById('dynamic-scheme-style');
                if (!dynStyle) {
                    dynStyle = document.createElement('style');
                    dynStyle.id = 'dynamic-scheme-style';
                    document.head.appendChild(dynStyle);
                }
                dynStyle.textContent = `
                    .link-button { background: ${palette['--btn-bg']} !important; color: ${palette['--button-text-color']} !important; }
                    .link-button:hover, .link-button:focus { background: ${palette['--btn-hover']} !important; }
                    .side-link { background: ${palette['--side-link-bg']} !important; color: ${palette['--dark-text-color']} !important; }
                    .side-link:hover, .side-link:focus { background: ${palette['--btn-hover']} !important; color: ${palette['--button-text-color']} !important; }
                `;
            }

            function applyThemeVisuals(theme) {
                const isDark = theme === 'dark';
                rootEl.classList.toggle('dark-mode', isDark);
                document.body.classList.toggle('dark-mode', isDark);
                rootEl.style.colorScheme = isDark ? 'dark' : 'light';
                if (themeToggleButton) themeToggleButton.setAttribute('aria-label', '點擊切換色系');

                // Re-apply current color scheme with new dark/light mode
                let currentScheme;
                try { currentScheme = localStorage.getItem(SCHEME_STORAGE_KEY); } catch(_) {}
                if (!currentScheme || !SCHEME_NAMES.includes(currentScheme)) currentScheme = SCHEME_NAMES[0];
                applyColorScheme(currentScheme, isDark);
            }

            function getSystemThemePreference() {
                const currentHour = new Date().getHours();
                return (currentHour >= 18 || currentHour < 6) ? 'dark' : 'light';
            }

            function toggleTheme() {
                // Cycle color scheme, not just dark/light
                let currentScheme;
                try { currentScheme = localStorage.getItem(SCHEME_STORAGE_KEY); } catch(_) {}
                if (!currentScheme || !SCHEME_NAMES.includes(currentScheme)) currentScheme = SCHEME_NAMES[0];

                const idx = SCHEME_NAMES.indexOf(currentScheme);
                const nextIdx = (idx + 1) % SCHEME_NAMES.length;
                const nextScheme = SCHEME_NAMES[nextIdx];

                // If cycling back to first scheme, also toggle dark/light
                if (nextIdx === 0) {
                    const isDark = rootEl.classList.contains('dark-mode') || document.body.classList.contains('dark-mode');
                    const newTheme = isDark ? 'light' : 'dark';
                    try { localStorage.setItem(THEME_STORAGE_KEY, newTheme); } catch(e) {}
                    applyThemeVisuals(newTheme);
                }

                try { localStorage.setItem(SCHEME_STORAGE_KEY, nextScheme); } catch(e) {}

                const isDark = rootEl.classList.contains('dark-mode') || document.body.classList.contains('dark-mode');
                applyColorScheme(nextScheme, isDark);
            }

            const unixValueEl = document.getElementById('unix-value');
            const binaryValueEl = document.getElementById('binary-value');

            function toBinary(n, bits) {
                return n.toString(2).padStart(bits, '0');
            }

            function updateClockAndDate(now) {
                if (clockDisplay) clockDisplay.textContent = now.toLocaleTimeString('zh-CN', TIME_OPTIONS);
                if (gregorianDateDisplay) gregorianDateDisplay.textContent = now.toLocaleDateString('zh-CN', DATE_OPTIONS);

                // Unix timestamp
                if (unixValueEl) {
                    unixValueEl.textContent = Math.floor(now.getTime() / 1000);
                }

                // Binary clock
                if (binaryValueEl) {
                    const h = now.getHours();
                    const m = now.getMinutes();
                    const s = now.getSeconds();
                    binaryValueEl.textContent = `${toBinary(h, 6)}:${toBinary(m, 6)}:${toBinary(s, 6)}`;
                }
            }

            function updateSingleCountdown(targetTime, nowTime, display, endMessage) {
                if (!display) return;
                const timeLeft = targetTime - nowTime;
                if (timeLeft <= 0) {
                    display.textContent = endMessage;
                    return;
                }
                const days = Math.floor(timeLeft / MS_IN_DAY);
                const hours = Math.floor((timeLeft % MS_IN_DAY) / MS_IN_HOUR);
                const minutes = Math.floor((timeLeft % MS_IN_HOUR) / MS_IN_MINUTE);
                const seconds = Math.floor((timeLeft % MS_IN_MINUTE) / MS_IN_SECOND);
                display.innerHTML = `${days}天 ${hours}小時 ${minutes}分鐘 ${seconds}秒`;
            }

            function updateHumanTimer(nowTime, display) {
                if (!display) return;
                const timeSinceHumanOrigin = nowTime - HUMAN_ORIGIN_APPROX_MS;
                const tenThousandYears = Math.floor(timeSinceHumanOrigin / MS_IN_TEN_THOUSAND_YEARS);
                const remainingTime = timeSinceHumanOrigin % MS_IN_TEN_THOUSAND_YEARS;
                const days = Math.floor(remainingTime / MS_IN_DAY);
                const hours = Math.floor((remainingTime % MS_IN_DAY) / MS_IN_HOUR);
                const minutes = Math.floor((remainingTime % MS_IN_HOUR) / MS_IN_MINUTE);
                const seconds = Math.floor((remainingTime % MS_IN_MINUTE) / MS_IN_SECOND);
                display.innerHTML = `${tenThousandYears}萬年 ${days}天 ${hours}小時 ${minutes}分鐘 ${seconds}秒`;
            }

            function pad2(n) { return String(n).padStart(2, '0'); }
            function formatMD(d) {
                const m = pad2(d.getMonth() + 1);
                const day = pad2(d.getDate());
                return `${m}/${day}`;
            }

            function setEndingVisual(fillEl, textEl, isEnding) {
                if (!fillEl || !textEl) return;
                fillEl.classList.toggle('is-ending', isEnding);
                textEl.classList.toggle('is-ending', isEnding);

                const container = fillEl.closest('.progress-bar-container');
                if (container) container.classList.toggle('is-ending', isEnding);
            }

            function updateProgressBar(now, fillEl, textEl, unit, titleEl) {
                if (!fillEl || !textEl) return;

                const nowTime = now.getTime();
                let startMs = 0;
                let endMs = 0;
                let titleText = '';

                if (unit === 'day') {
                    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
                    startMs = start.getTime();
                    endMs = end.getTime();
                    titleText = `今日已逝`;
                } else if (unit === 'week') {
                    const currentDay = now.getDay();
                    const offsetToMonday = (currentDay === 0) ? 6 : currentDay - 1;
                    const mondayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - offsetToMonday);
                    mondayStart.setHours(0, 0, 0, 0);
                    const nextMonday = new Date(mondayStart.getTime() + MS_IN_WEEK);
                    startMs = mondayStart.getTime();
                    endMs = nextMonday.getTime();

                    const weekEnd = new Date(endMs - MS_IN_DAY);
                    titleText = `本週已逝 · ${formatMD(mondayStart)}–${formatMD(weekEnd)}`;
                } else if (unit === 'year') {
                    const year = now.getFullYear();
                    const yearStart = new Date(year, 0, 1);
                    const nextYearStart = new Date(year + 1, 0, 1);
                    startMs = yearStart.getTime();
                    endMs = nextYearStart.getTime();
                    titleText = `${year}年度已逝`;
                } else {
                    return;
                }

                if (titleEl) titleEl.textContent = titleText;

                const total = Math.max(1, endMs - startMs);
                const elapsed = Math.max(0, Math.min(total, nowTime - startMs));
                const progress = Math.min(100, (elapsed / total) * 100);
                const progressFormatted = progress.toFixed(2);

                fillEl.style.width = `${progressFormatted}%`;
                textEl.textContent = `${progressFormatted}%`;

                const container = fillEl.closest('.progress-bar-container');
                if (container) container.setAttribute('aria-valuenow', progressFormatted);

                setEndingVisual(fillEl, textEl, progress >= 95);
            }

            function syntaxHighlight(json) {
                if (typeof json !== 'string') {
                    json = JSON.stringify(json, null, 2);
                }
                return json.replace(/(&)|(<)|(>)|("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|\bnull\b)/g, function (match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'json-key';
                        } else {
                            cls = 'json-string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                });
            }

                { label: '中國哲學書電子化計劃', href: 'https://ctext.org/zh', aria: '中國哲學書電子化計劃' },
                { label: '讀秀', href: 'https://www.duxiu.com/', aria: '讀秀' },
                { label: '語雀', href: 'https://www.yuque.com/r/organizations/bdfz/join?token=8jDK7qvJ741Gnw2p&source=org#', aria: '語雀' }
            ];

            function renderPortalColumns() {
                const leftList = document.getElementById('left-link-list');
                const rightList = document.getElementById('right-link-list');
                if (!leftList || !rightList) return;
                const pivot = Math.floor(portalLinks.length / 2);
                const buildLinksHtml = (items) => items.map((item) => `
                    <a href="${item.href}" class="link-button side-link" target="_blank" rel="noopener noreferrer" aria-label="${item.aria}">${item.label}</a>
                `).join('');
                leftList.innerHTML = buildLinksHtml(portalLinks.slice(0, pivot));
                rightList.innerHTML = buildLinksHtml(portalLinks.slice(pivot));
            }

            renderPortalColumns();

            // === 6. Link Preview Cards ===
            const previewCard = document.getElementById('link-preview-card');
            const previewFavicon = document.getElementById('link-preview-favicon');
            const previewTitle = document.getElementById('link-preview-title');
            const previewUrl = document.getElementById('link-preview-url');
            let previewTimeout = null;

            function showPreview(e, link) {
                if (!previewCard || !link.href) return;
                try {
                    const url = new URL(link.href);
                    const domain = url.hostname;
                    previewFavicon.src = `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(link.href)}&size=32`;
                    previewTitle.textContent = link.textContent || domain;
                    previewUrl.textContent = domain;

                    const rect = link.getBoundingClientRect();
                    previewCard.style.left = `${rect.left}px`;
                    previewCard.style.top = `${rect.bottom + 8}px`;

                    previewCard.classList.add('visible');
                } catch (err) { }
            }

            function hidePreview() {
                if (previewCard) previewCard.classList.remove('visible');
            }

            document.querySelectorAll('.side-scroll .link-button').forEach(link => {
                link.addEventListener('mouseenter', (e) => {
                    previewTimeout = setTimeout(() => showPreview(e, link), 400);
                });
                link.addEventListener('mouseleave', () => {
                    clearTimeout(previewTimeout);
                    hidePreview();
                });
            });

            // === 7. Drag and Drop Link Sorting ===
            function initDragSort(container, storageKey) {
                const scroll = container.querySelector('.side-scroll');
                if (!scroll) return;

                // Load saved order
                const savedOrder = localStorage.getItem(storageKey);
                if (savedOrder) {
                    try {
                        const order = JSON.parse(savedOrder);
                        const links = Array.from(scroll.querySelectorAll('.link-button'));
                        const linkMap = {};
                        links.forEach(link => { linkMap[link.href] = link; });
                        order.forEach(href => {
                            if (linkMap[href]) scroll.appendChild(linkMap[href]);
                        });
                    } catch (e) { }
                }

                // Make links draggable
                scroll.querySelectorAll('.link-button').forEach(link => {
                    link.draggable = true;

                    link.addEventListener('dragstart', (e) => {
                        link.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', link.href);
                    });

                    link.addEventListener('dragend', () => {
                        link.classList.remove('dragging');
                        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                        // Save new order
                        const newOrder = Array.from(scroll.querySelectorAll('.link-button')).map(l => l.href);
                        localStorage.setItem(storageKey, JSON.stringify(newOrder));
                    });

                    link.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        const dragging = scroll.querySelector('.dragging');
                        if (dragging && dragging !== link) {
                            link.classList.add('drag-over');
                            const rect = link.getBoundingClientRect();
                            const midY = rect.top + rect.height / 2;
                            if (e.clientY < midY) {
                                scroll.insertBefore(dragging, link);
                            } else {
                                scroll.insertBefore(dragging, link.nextSibling);
                            }
                        }
                    });

                    link.addEventListener('dragleave', () => {
                        link.classList.remove('drag-over');
                    });

                    link.addEventListener('drop', (e) => {
                        e.preventDefault();
                        link.classList.remove('drag-over');
                    });
                });
            }

            const leftCol = document.querySelector('.left-column');
            const rightCol = document.querySelector('.right-column');
            if (leftCol) initDragSort(leftCol, 'leftLinksOrder');
            if (rightCol) initDragSort(rightCol, 'rightLinksOrder');

            // === 8. Typewriter Effect for Title ===
            const humanTitle = document.querySelector('#human-timer .countdown-title');
            if (humanTitle) {
                const originalText = humanTitle.textContent;
                humanTitle.textContent = '';
                humanTitle.style.display = 'inline-block';
                let i = 0;
                function typeChar() {
                    if (i < originalText.length) {
                        humanTitle.textContent += originalText.charAt(i);
                        i++;
                        setTimeout(typeChar, 100);
                    }
                }
                setTimeout(typeChar, 500);
            }

        });
    </script>
</body>
